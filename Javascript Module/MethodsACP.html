<!DOCTYPE html>
<html>
    <head>
        <title>Methods in Array</title>
    </head>
    <body>
      <h2>JavaScript Array Methods</h2>
<h2>Some of the coolest cars</h2>
<p>"Cool" is subjective, but a truly cool car usually blends jaw-dropping design, incredible engineering, and cultural impact.</p>
<p id="myjoin"></p>
<p id="myfirstpop"></p>
<p id="mysecondpop"></p>
<script>
var cars = ["Bugatti", "Ferrari", "Porsche", "Land Rover"];
     document.getElementById("myjoin").innerHTML = cars.join(" * ");
     document.getElementById("myfirstpop").innerHTML = cars.join(" * ");
     document.getElementById("myfirstpop").innerHTML = cars;
      cars.pop();
      document.getElementById("mysecondpop").innerHTML = cars;
      </script>
    </body>
</html>
