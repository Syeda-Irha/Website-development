<!DOCTYPE html>
<html>
    <head>
        <title>Text Guide in JavaScript</title>
    </head>
    <body>
        <h1 id="myH"></h1>
        <p id="myP"></p>
        <p id="result"></p>
        <p id="demo"></p>
        <script>
            //Heading
            document.getElementById("myH").innerHTML = "JavaScript Comments";
            //Paragraph
            document.getElementById("myP").innerHTML = "My first paragraph.";

            var num1 = 5;
            var num2 = 6;
            var sum = num1 + num2;
            document.getElementById("result").innerHTML=
            "The total sum is:" + sum;

            //*use +,-,* / operators*/
            var x = 5;
            var y = 6;
            var z = x * y;
            document.getElementById("demo").innerHTML = z;
        </script>
    </body>
</html>
