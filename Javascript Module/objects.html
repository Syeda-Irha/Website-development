<!DOCTYPE html>
<html>
    <head>
        <title>Objects in JS</title>
    </head>
    <body>
        <h2>JS obj's and its properties</h2>
        <p>There are 2 different ways to access and obj property</p>
        <p id="Demo"></p>
        <script>
            // Creaste an obj
            var person = {
                firstname: "I",
                age: 20
            };

            // Display some data from the object:
           document.getElementById("Demo").innerHTML = person.firstname + "am" + person.age +
           "years old";
        </script>

    </body>
</html>
