<!DOCTYPE html>
<html>
    <head><title>Forms in HTML</title></head>
    <body>
        <h1>Anime details form</h1>
        <forms>
            <fieldset>
                <legend>Anime details</legend>
            <label>Anime Name:</label><br>
            <input type="text" id="Name"><br><br>
            <label>Main Character:</label>
            <input type="text" id="MC"><br><br>
            <label>Studio:</label><br>
            <input type="password" id="studio"><br><br>
            <label>Theme:</label><br>
            <input type="radio" id="Action" name="theme" value="Action">Action<br>
            <input type="radio" id="Psychological" name="theme" value="Psychological">Psychological<br>
            <input type="radio" id="Slice of life" name="theme" value="Slice of life">Slice of life<br>
            <label>Status:</label><br>
            <input type="checkbox" id="status" value="Watched">Watched<br>
            <input type="checkbox" id="status" value="Watching">Watching<br>
            <input type="checkbox" id="status" value="On Hold">On Hold<br><br>
            <input type="submit">
            </fieldset>
        </forms>
    </body>
</html>
