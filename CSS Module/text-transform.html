<!DOCTYPE html>
<html>
    <style>
        h1 {
  text-decoration: overline;
  text-transform: capitalize;
}

h2 {
  text-decoration: line-through;
  text-transform: uppercase;
}

h3 {
  text-decoration: underline;
  text-transform: lowercase;
}

h4 {
  text-decoration: underline overline;
  text-transform: none;
}
    </style>
    <body>
        <h1>Faithfullness</h1>
        <h2>Kindness</h2>
        <h3>Honesty</h3>
        <h4>Loyalty</h4>
    </body>
</html>
