<!DOCTYPE html>
<html>
    <head>
        <title>Trading Card</title>
        <style>
            body{
                font-family: Arial, sans-serif;
                background-color: rgb(139, 79, 194);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }
            .card{
                background-color: rgb(203, 129, 243);
                color: white;
                text-align: center;
                width: 220px;
                padding: 30px;
                border: 5px solid #dac652;

            }
            .card h2{
                font-size: 1.3em;
                margin-bottom: 10px;
            }
            .card p{
                font-size: 0.9em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>🌸Anya🌸</h2>
            <p>Anime: Spy X Family</p>
            <p>Abilities: Telepathy</p>
            <p>Birthday: March 3</p>
            <p>Height: 3'3</p>
            <p>Age: 6 years</p>
            <p>School name: Eden Academy</p>
        </div>
    </body>
</html>
