<!DOCTYPE html>
<html>
    <head>
        <title>Linear Gradient</title>
        <style>
            #grad1{
                height: 400px;
                background-color: rgb(135, 83, 180); /* For browsers that do not support gradients*/
                background-image: linear-gradient(to top right, rgb(230, 86, 132), rgb(221, 173, 86), rgb(234, 227, 82), rgb(118, 219, 102), rgb(108, 170, 236), rgb(183, 108, 237), violet);
            }
        </style>
    </head>
    <body>
        <div id="grad1" style="text-align:center;margin:auto;color:#312626f2;font-size: 40px;font-weight: bold;">
            『WIND BREAKER』は、街を守る英雄となった不良たちの熱い戦いと絆を描いた物語です。

        </div>
    </body>
</html>
