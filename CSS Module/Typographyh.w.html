<!DOCTYPE html>
<html>
    <head>
<title>Typography</title>
<style>
.text1 {
  color: rgb(132, 52, 159);
  font-size: 30px;
}

.p1 {
  color: rgb(36, 103, 192);
  font-family: 'Courier New', Courier, monospace;
}
</style>
<style>
h4 {
  text-decoration: underline overline;
  text-transform: none;
}
</style>
    </head>
<body>

<h1>Typography</h1>

<p class="text1">My hobbies: Horse riding!!!!!</p>
<p class="p1">My horses: Sunrise, Sunshine, Paradise, Sunlight, Sun sore, Sun set, Reawakening sun, Brave</p>
<h4>Sunrise R.I.P</h4>
</body>
</html>
